<style>
:root{

  --green:#4ade80;--green-bg:#0d2218;
  --amber:#fbbf24;--amber-bg:#1f1500;
  --red:#f87171;--red-bg:#2a0a0a;
  --blue:#60a5fa;--blue-bg:#0a1628;
  --purple:#a78bfa;--purple-bg:#1a1028;
  --accent:#4ade80;
  --radius:8px;--radius-lg:12px;

}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#setup{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.setup-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:40px;max-width:480px;width:100%}
.setup-logo{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.15em;margin-bottom:32px;text-transform:uppercase}
.setup-box h1{font-size:22px;font-weight:300;margin-bottom:8px}
.setup-box p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.setup-box input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;margin-bottom:12px}
.setup-box input:focus{border-color:var(--accent)}
.setup-hint{font-size:12px;color:var(--text3);margin-bottom:20px}
.setup-hint a{color:var(--blue);text-decoration:none}
.btn-setup{width:100%;padding:12px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.topbar-left .logo{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
.topbar-left h1{font-size:13px;font-weight:400}
.topbar-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.top-stat .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.top-stat .val{font-size:13px;font-weight:500;font-family:var(--mono)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:4px}
.sync-dot.ok{background:var(--green)}.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-actions{display:flex;gap:6px}
.tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg2);overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text);background:var(--bg3)}
.content{padding:16px;flex:1;max-width:1100px;width:100%;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px}
.metric .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric .val{font-size:18px;font-weight:300;font-family:var(--mono)}
.metric .val2{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.metric.ok .val{color:var(--green)}.metric.warn .val{color:var(--amber)}.metric.danger .val{color:var(--red)}.metric.info .val{color:var(--blue)}.metric.purple .val{color:var(--purple)}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.card h3{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.prog-wrap{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;margin:5px 0}
.prog-fill{height:100%;border-radius:99px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10px;font-weight:500;color:var(--text3);padding:5px 7px;border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 8px;border-bottom:0.5px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:500}
.b-ok{background:var(--green-bg);color:var(--green)}.b-warn{background:var(--amber-bg);color:var(--amber)}
.b-info{background:var(--blue-bg);color:var(--blue)}.b-gray{background:var(--bg3);color:var(--text2)}
.b-danger{background:var(--red-bg);color:var(--red)}.b-purple{background:var(--purple-bg);color:var(--purple)}
input,select,textarea{font-size:13px;width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;color:var(--text);font-family:var(--font);outline:none}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg3)}
.frow{display:grid;gap:8px;margin-bottom:9px}
.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}.f4{grid-template-columns:1fr 1fr 1fr 1fr}.f5{grid-template-columns:2fr 1fr 1fr 1fr auto}
.fgroup{display:flex;flex-direction:column;gap:3px}
.fgroup label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.btn{padding:7px 13px;font-size:13px;cursor:pointer;border-radius:var(--radius);font-family:var(--font);white-space:nowrap;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#000;border:none;font-weight:500}
.btn-ghost{background:transparent;border:0.5px solid var(--border2);color:var(--text)}
.btn-danger{background:var(--red-bg);border:0.5px solid var(--red);color:var(--red)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-ia{background:var(--purple-bg);border:0.5px solid var(--purple);color:var(--purple);font-size:12px;padding:6px 12px}
.msg-ok{font-size:12px;color:var(--green);margin-top:5px}
.msg-err{font-size:12px;color:var(--red);margin-top:5px}
.empty{font-size:13px;color:var(--text3);padding:8px 0}
.chat-wrap{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto;margin-bottom:10px}
.cmsg{display:flex;gap:7px;align-items:flex-start}
.cmsg.user{flex-direction:row-reverse}
.cbubble{padding:8px 12px;border-radius:var(--radius-lg);font-size:13px;max-width:83%;line-height:1.55;white-space:pre-wrap}
.cmsg.ai .cbubble{background:var(--bg3);border:0.5px solid var(--border)}
.cmsg.user .cbubble{background:var(--accent);color:#000}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;font-family:var(--mono)}
.av-ai{background:var(--purple-bg);color:var(--purple);border:0.5px solid var(--purple)}.av-u{background:var(--bg4);color:var(--text2)}
.chat-ir{display:flex;gap:8px}.chat-ir input{flex:1}
.dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bl 1.2s infinite;display:inline-block;margin:0 2px}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.15}40%{opacity:1}}
.suggestion-card{background:var(--purple-bg);border:0.5px solid var(--purple);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.cat-pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg3);margin:2px;transition:all .15s}
.cat-pill:hover,.cat-pill.sel{background:var(--accent);color:#000;border-color:var(--accent)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>

</div>

<div id="app">

      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="go('resumen',this)">Resumen</button>

    <button class="tab" onclick="go('asistente',this)">Asistente IA</button>
    <button class="tab" onclick="go('ajustes',this)">Ajustes</button>
  </div>
  <div class="content" id="main"></div>
</div>

// ── UTILS ──
const fmtARS=n=>'$'+new Intl.NumberFormat('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const today=()=>new Date().toISOString().split('T')[0];
const mesActual=()=>new Date().toISOString().substring(0,7);
const uid=()=>String(S.uid++);

function totalMes(mes){
  return S.gastos.filter(function(g){return g.fecha&&g.fecha.startsWith(mes);}).reduce(function(s,g){return s+g.monto;},0);
}
function totalAnio(){return S.gastos.reduce(function(s,g){return s+g.monto;},0);}
function totalCat(cat){return S.gastos.filter(function(g){return g.cat===cat;}).reduce(function(s,g){return s+g.monto;},0);}

// ── SYNC ──
let syncTimer=null;
function setSyncStatus(state,msg){
  var dot=document.getElementById('sync-dot');var lbl=document.getElementById('sync-label');
  if(dot)dot.className='sync-dot '+state;if(lbl)lbl.textContent=msg||'';
}
function getScriptUrl(){return SCRIPT_URL||S.scriptUrl||localStorage.getItem('gastos_script_url')||'';}

async function syncToCloud(){
  var url=getScriptUrl();if(!url)return;
  setSyncStatus('syncing','Guardando...');
  try{
    var res=await fetch(url,{method:'POST',body:JSON.stringify({action:'set',key:DATA_KEY,value:JSON.stringify(S)})});
    var data=await res.json();
    if(data.ok){S.syncedAt=new Date().toISOString();setSyncStatus('ok','Sincronizado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));}
    else setSyncStatus('err','Error');
  }catch(e){setSyncStatus('err','Sin conexion');}
}

async function syncFromCloud(){
  // Don't sync if user is typing or there are IA suggestions visible
  var iaInput=document.getElementById('ia-input');
  if(iaInput&&document.activeElement===iaInput){setSyncStatus('ok','En espera...');return false;}
  var cinInput=document.getElementById('cin');
  if(cinInput&&document.activeElement===cinInput){setSyncStatus('ok','En espera...');return false;}
  var cards=document.querySelectorAll('.suggestion-card');
  if(cards.length>0){setSyncStatus('ok','En espera...');return false;}
  // Don't sync if any input/select is focused
  var active=document.activeElement;
  if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.tagName==='SELECT')){setSyncStatus('ok','En espera...');return false;}
  var url=getScriptUrl();if(!url)return false;
  setSyncStatus('syncing','Cargando...');
  try{
    var res=await fetch(url+'?action=get&key='+DATA_KEY);
    var data=await res.json();
    if(data.ok&&data.value){
      var remote=JSON.parse(data.value);
      if(!remote.gastos)remote.gastos=[];
      if(!remote.uid)remote.uid=S.uid;
      // Preserve ts from local data
      var localTs={};
      (S.gastos||[]).forEach(function(g){if(g.ts)localTs[g.id]=g.ts;});
      remote.gastos.forEach(function(g){if(!g.ts&&localTs[g.id])g.ts=localTs[g.id];});
      S=remote;
      localStorage.setItem('gastos_hogar',JSON.stringify(S));
      setSyncStatus('ok','Actualizado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}));
      return true;
    }
    setSyncStatus('ok','Al dia');return false;
  }catch(e){setSyncStatus('err','Sin conexion');return false;}
}

function guardar(){
  localStorage.setItem('gastos_hogar',JSON.stringify(S));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){syncToCloud();},2000);
  updateTopbar();
}

function cargar(){
  try{
    var d=localStorage.getItem('gastos_hogar');
    if(d){var p=JSON.parse(d);if(p.gastos){p.gastos.forEach(function(g){if(!g.medio)g.medio='';});S=p;}}
  }catch(e){}
}

function exportarDatos(){
  var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download='gastos-hogar-backup-'+today()+'.json';a.click();URL.revokeObjectURL(url);
}
function importarDatos(input){

function rResumen(c){
  var mes=mesActual();

  var totMes=totalMes(mes);
  var totAnio=totalAnio();

  // Category breakdown this month
  var porCat={};
  gastosEsMes.forEach(function(g){porCat[g.cat]=(porCat[g.cat]||0)+g.monto;});
  var sorted=Object.entries(porCat).sort(function(a,b){return b[1]-a[1];});

  // Last 5 months
  var byMes={};
  S.gastos.forEach(function(g){if(g.fecha){var m=g.fecha.substring(0,7);byMes[m]=(byMes[m]||0)+g.monto;}});
  var meses=Object.entries(byMes).sort(function(a,b){return b[0].localeCompare(a[0]);}).slice(0,6);

  var html='<div class="metrics">';

  html+='<div class="metric"><div class="lbl">Gastos este mes</div><div class="val">'+gastosEsMes.length+'</div></div>';
  if(S.presupuestoMensual>0){
    var pct=Math.round((totMes/S.presupuestoMensual)*100);
    html+='<div class="metric '+(pct>100?'danger':pct>80?'warn':'ok')+'"><div class="lbl">vs presupuesto</div><div class="val">'+pct+'%</div><div class="val2">'+fmtARS(S.presupuestoMensual)+'/mes</div></div>';
  }
  html+='</div>';

  if(S.presupuestoMensual>0){
    var pct2=Math.min(100,Math.round((totMes/S.presupuestoMensual)*100));
    var bc=pct2>100?'var(--red)':pct2>80?'var(--amber)':'var(--green)';
    html+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;color:var(--text2)">Presupuesto mensual</span><span style="font-family:var(--mono);font-size:12px">'+fmtARS(totMes)+' / '+fmtARS(S.presupuestoMensual)+'</span></div>';
    html+='<div class="prog-wrap"><div class="prog-fill" style="width:'+pct2+'%;background:'+bc+'"></div></div></div>';
  }

  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">';

  // Cat breakdown
  html+='<div class="card"><h3>'+mesNombre+' por categoria</h3>';
  if(!sorted.length)html+='<p class="empty">Sin gastos este mes.</p>';
  else sorted.forEach(function(e){
    var cat=e[0],monto=e[1];
    var pct=totMes>0?Math.min(100,Math.round((monto/totMes)*100)):0;
    var col=CAT_COLORS[cat]||'var(--blue)';
    html+='<div style="margin-bottom:9px">';
    html+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">';
    html+='<span style="color:var(--text2)">'+cat+'</span><span style="font-family:var(--mono)">'+fmtARS(monto)+'</span></div>';
    html+='<div style="display:flex;align-items:center;gap:8px">';
    html+='<div class="prog-wrap" style="flex:1;margin:0"><div class="prog-fill" style="width:'+pct+'%;background:'+col+'"></div></div>';
    html+='<span style="font-size:11px;color:var(--text3);width:35px;text-align:right">'+pct+'%</span></div></div>';
  });
  html+='</div>';

  // Monthly trend
  html+='<div class="card"><h3>Ultimos meses</h3>';
  if(!meses.length)html+='<p class="empty">Sin datos.</p>';
  else{
    var maxMes=Math.max.apply(null,meses.map(function(x){return x[1];}));
    meses.forEach(function(e){
      var m=e[0],monto=e[1];
      var parts=m.split('-');
      var label=MESES_NAMES[parseInt(parts[1])]+' '+parts[0];
      var pct=maxMes>0?Math.min(100,Math.round((monto/maxMes)*100)):0;
      html+='<div style="margin-bottom:9px">';

      html+='<span style="color:var(--text2)">'+label+'</span><span style="font-family:var(--mono)">'+fmtARS(monto)+'</span></div>';
      html+='<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%;background:var(--blue)"></div></div></div>';
    });
  }
  html+='</div></div>';

  // Medio de pago summary
  var porMedioRes={};
  gastosEsMes.forEach(function(g){var m=g.medio||'Sin especificar';porMedioRes[m]=(porMedioRes[m]||0)+g.monto;});
  var medioEntries=Object.entries(porMedioRes).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  if(medioEntries.length>0){
    html+='<div class="card" style="margin-bottom:12px"><h3>'+mesNombre+' — medio de pago</h3>';
    html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    medioEntries.forEach(function(e){
      var pct=totMes>0?Math.round((e[1]/totMes)*100):0;
      var col=e[0]==='Efectivo'?'var(--green)':e[0].includes('AMEX')?'var(--purple)':e[0].includes('Debito')?'var(--blue)':e[0]==='Sin especificar'?'var(--text3)':'var(--amber)';
      html+='<div style="display:flex;align-items:center;gap:6px;background:var(--bg3);padding:6px 12px;border-radius:99px">';
      html+='<div style="width:8px;height:8px;border-radius:50%;background:'+col+'"></div>';
      html+='<span style="font-size:12px;color:var(--text2)">'+e[0]+'</span>';

      html+='<span style="font-size:11px;color:var(--text3)">'+fmtARS(e[1])+'</span>';
      html+='</div>';
    });
    html+='</div></div>';
  }

  // Ultimos gastos
  html+='<div class="card"><h3>Ultimos gastos</h3>';
  var hoy3=today();
  var ultimos=[].concat(S.gastos).filter(function(g){return !g.fecha||g.fecha<=hoy3;}).sort(function(a,b){if(b.fecha!==a.fecha)return b.fecha.localeCompare(a.fecha);var an=parseInt((a.id||'g0').replace('g',''))||0;var bn=parseInt((b.id||'g0').replace('g',''))||0;return bn-an;}).slice(0,8);
  if(!ultimos.length)html+='<p class="empty">Sin gastos registrados.</p>';
  else{
    html+='<table><thead><tr><th>Fecha</th><th>Descripcion</th><th>Categoria</th><th>Subcategoria</th><th style="text-align:right">Monto</th></tr></thead><tbody>';
    ultimos.forEach(function(g){
      html+='<tr><td style="color:var(--text3)">'+g.fecha+'</td><td>'+g.desc+'</td>';
      html+='<td><span class="badge b-gray" style="font-size:10px">'+g.cat+'</span></td>';
      html+='<td style="color:var(--text3)">'+g.subcat+'</td>';
      html+='<td style="text-align:right;font-family:var(--mono)">'+fmtARS(g.monto)+'</td></tr>';
    });
    html+='</tbody></table>';
  }
  html+='</div>';
  c.innerHTML=html;
}

function agregarGasto(prefill){
  var desc=(prefill&&prefill.desc)||document.getElementById('gs-d').value.trim();
  var monto=(prefill&&prefill.monto)||parseFloat(document.getElementById('gs-m').value)||0;
  var cat=(prefill&&prefill.cat)||document.getElementById('gs-c').value;
  var subcat=(prefill&&prefill.subcat)||document.getElementById('gs-s').value;
  var fecha=(prefill&&prefill.fecha)||document.getElementById('gs-f').value||today();
  var obs=(prefill&&prefill.obs)||document.getElementById('gs-o').value.trim();
  var msg=document.getElementById('gs-msg');
  if(!desc||!monto){if(msg){msg.className='msg-err';msg.textContent='Completa descripcion y monto.';}return;}
  // If editing, remove old record first
  if(_editingId){
    S.gastos=S.gastos.filter(function(x){return x.id!==_editingId;});
    _editingId=null;
  }
  var medio=(prefill&&prefill.medio)||( document.getElementById('gs-med')?document.getElementById('gs-med').value:'');
  S.gastos.push({id:'g'+uid(),cat:cat,subcat:subcat,fecha:fecha,desc:desc,monto:monto,obs:obs,medio:medio,ts:Date.now()});
  guardar();
  if(msg){msg.className='msg-ok';msg.textContent='Guardado: '+desc+' — '+fmtARS(monto);}
  document.getElementById('gs-d').value='';document.getElementById('gs-m').value='';
  document.getElementById('gs-o').value='';document.getElementById('gs-prev').textContent='';
  var gmed=document.getElementById('gs-med');if(gmed)gmed.value='';
}

function confirmarIAEdit(i){

    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">';
    var maxM=medioEntries[0][1];
    medioEntries.forEach(function(e){
      var pct=Math.min(100,Math.round((e[1]/totAnio)*100));
      html+='<div style="background:var(--bg3);border-radius:var(--radius);padding:12px">';

      html+='<div style="font-size:11px;color:var(--text3)">'+pct+'% del total</div></div>';
    });
    html+='</div></div>';
  }

  c.innerHTML=html;

    if(!g.fecha||g.fecha>hoy)return false;
    if(!busq)return true;
    return (g.desc||'').toLowerCase().includes(busq)||
           (g.cat||'').toLowerCase().includes(busq)||
           (g.subcat||'').toLowerCase().includes(busq)||
           (g.medio||'').toLowerCase().includes(busq)||
           (g.obs||'').toLowerCase().includes(busq)||
           String(g.monto||'').includes(busq);

      if(!g.fecha)return;

    });

      html+='<td style="color:var(--text2);font-size:12px">'+g.subcat+'</td>';
      html+='<td style="font-size:12px;color:'+(g.medio?'var(--text2)':'var(--text3)')+';max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(g.medio||'')+'">'+( g.medio||'—')+'</td>';

      html+='<td style="text-align:right;font-family:var(--mono);font-weight:500">'+fmtARS(g.monto)+'</td>';

      html+='<button class="btn btn-sm" style="padding:6px 10px;font-size:12px;min-height:32px" data-gid="'+g.id+'" onclick="elimGastoById(this)">x</button>';
      html+='</td></tr>';

function elimGastoById(btn){
  var id=btn.getAttribute('data-gid');
  if(!confirm('Eliminar este gasto?'))return;
  S.gastos=S.gastos.filter(function(g){return g.id!==id;});
  guardar();renderTab();
}

var _editingId=null;
function editGastoHogarById(btn){
  var id=btn.getAttribute('data-gid');
  var g=S.gastos.find(function(x){return x.id===id;});
  if(!g)return;
  _editingId=id;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(b){if(b.textContent.trim()==='Cargar gasto')b.classList.add('active');});
  currentTab='cargar';
  renderTab();
  setTimeout(function(){
    var dc=document.getElementById('gs-d'); if(dc)dc.value=g.desc||'';
    var mc=document.getElementById('gs-m'); if(mc)mc.value=g.monto||'';
    var fc=document.getElementById('gs-f'); if(fc)fc.value=g.fecha||today();
    var oc=document.getElementById('gs-o'); if(oc)oc.value=g.obs||'';
    var cc=document.getElementById('gs-c');
    if(cc){cc.value=g.cat||'';updateSubcats();}
    setTimeout(function(){
      var sc=document.getElementById('gs-s'); if(sc&&g.subcat)sc.value=g.subcat;
      var medc=document.getElementById('gs-med'); if(medc&&g.medio)medc.value=g.medio;
      prevGasto();
    },50);
    var msg=document.getElementById('gs-msg');
    if(msg){msg.className='msg-ok';msg.textContent='Editando: '+g.desc+' — modifica y toca Agregar.';}
  },100);
}

// ── ASISTENTE ──
var chatH=[{role:'ai',text:'Hola! Soy tu asistente de gastos. Podes preguntarme cuanto gastaste en supermercado este mes, en que categoria gastas mas, o simplemente escribir gastos en lenguaje natural y los categorizo automaticamente.\n\nEjemplos:\n• "Kiosko 3500"\n• "Farmacia Fabiana 28000 ayer"\n• "Cuanto gaste en alimentos este mes?"'}];

function rAsistente(c){
  var html='<div class="card"><h3>Asistente IA</h3>';
  if(!API_KEY)html+='<p style="font-size:13px;color:var(--amber);margin-bottom:10px">Sin API key. Configura en Ajustes para usar el asistente.</p>';
  html+='<div class="chat-wrap" id="cbox">'+buildChat()+'</div>';
  html+='<div class="chat-ir"><input id="cin" placeholder="Escribi un gasto o una pregunta..." onkeydown="if(event.key===\'Enter\')sendChat()"/>';
  html+='<button class="btn btn-ia" onclick="sendChat()">Enviar</button></div></div>';
  c.innerHTML=html;
  var box=document.getElementById('cbox');if(box)box.scrollTop=box.scrollHeight;
}
function buildChat(){
  return chatH.map(function(m){
    return '<div class="cmsg '+m.role+'"><div class="av '+(m.role==='ai'?'av-ai':'av-u')+'">'+(m.role==='ai'?'IA':'Vos')+'</div>'+
      '<div class="cbubble">'+m.text.replace(/</g,'&lt;')+'</div></div>';
  }).join('');
}
async function sendChat(){
  if(!API_KEY){alert('Configura tu API key en Ajustes.');return;}
  var inp=document.getElementById('cin');var msg=inp.value.trim();if(!msg)return;
  inp.value='';
  chatH.push({role:'user',text:msg});
  var box=document.getElementById('cbox');
  box.innerHTML=buildChat()+'<div class="cmsg ai"><div class="av av-ai">IA</div><div class="cbubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  box.scrollTop=box.scrollHeight;

  var mes=mesActual();
  var totMes=totalMes(mes);
  var porCat={};S.gastos.forEach(function(g){porCat[g.cat]=(porCat[g.cat]||0)+g.monto;});
  var catList=Object.entries(CATEGORIAS).map(function(e){return e[0]+': '+e[1].join(', ');}).join('\n');

  var ctx='Sos un asistente de gastos del hogar argentino. Responde en espanol rioplatense, conciso.\n'+
    'Datos actuales - Total 2026: '+fmtARS(totalAnio())+', Mes actual: '+fmtARS(totMes)+'\n'+
    'Por categoria este anio: '+Object.entries(porCat).map(function(e){return e[0]+' '+fmtARS(e[1]);}).join(', ')+'\n'+
    'Categorias disponibles:\n'+catList+'\n'+
    'Si el usuario escribe un gasto (ej: "farmacia 28000"), interpretas el monto, categoria y subcategoria, y respondes confirmando lo que cargarias. '+
    'Si pregunta por datos, respondes con los numeros reales que tenes arriba.\n'+
    'Hoy es: '+today();

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:ctx,
        messages:chatH.slice(-8).map(function(m){return{role:m.role==='ai'?'assistant':'user',content:m.text};})})
    });
    var data=await res.json();
    var reply=data.content&&data.content[0]?data.content[0].text:'Error.';
    chatH.push({role:'ai',text:reply});
  }catch(e){chatH.push({role:'ai',text:'Error de conexion.'});}
  box.innerHTML=buildChat();box.scrollTop=box.scrollHeight;
}

// ── AJUSTES ──
function rAjustes(c){
  var url=getScriptUrl();
  var html='<div class="card"><h3>Presupuesto mensual</h3>';
  html+='<div class="frow f2"><div class="fgroup"><label>Presupuesto mensual ($)</label>';
  html+='<input id="aj-pres" type="number" value="'+(S.presupuestoMensual||'')+'" placeholder="Ej: 3000000"/></div>';
  html+='<div class="fgroup"><label>&nbsp;</label><button class="btn btn-primary" onclick="guardarAjustes()">Guardar</button></div></div>';
  html+='<div id="aj-msg"></div></div>';

  html+='<div class="card"><h3>Google Sheets — Sincronizacion</h3>';
  html+='<p style="font-size:13px;color:var(--text2);margin-bottom:10px">Pega la URL del Google Apps Script para sincronizar con Fabiana en tiempo real.</p>';
  html+='<div class="frow f2"><div class="fgroup"><label>URL del script</label>';
  html+='<input id="aj-url" placeholder="https://script.google.com/macros/s/..." value="'+(url||'')+'"/></div>';
  html+='<div class="fgroup"><label>&nbsp;</label><button class="btn btn-ghost" onclick="guardarUrl()">Guardar URL</button></div></div>';
  if(url)html+='<button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="syncFromCloud().then(function(){renderTab();updateTopbar();alert(\'Sincronizado!\')})">Sincronizar ahora</button>';
  html+='</div>';

  html+='<div class="card"><h3>API key Anthropic</h3>';
  html+='<div class="frow f2"><div class="fgroup"><label>API key</label>';
  html+='<input type="password" id="aj-k" placeholder="'+(API_KEY?'(guardada)':'sk-ant-...')+'"/></div>';
  html+='<div class="fgroup"><label>&nbsp;</label><button class="btn btn-ghost btn-sm" onclick="cambiarKey()">Actualizar</button></div></div></div>';

  html+='<div class="card"><h3>Backup</h3>';
  html+='<div style="display:flex;gap:10px;flex-wrap:wrap">';
  html+='<button class="btn btn-ghost" onclick="exportarDatos()">Descargar backup (.json)</button>';
  html+='<label class="btn btn-ghost" style="cursor:pointer">Restaurar backup<input type="file" accept=".json" onchange="importarDatos(this)" style="display:none;width:auto"></label></div></div>';

  html+='<div class="card"><h3>Zona peligrosa</h3>';
  html+='<button class="btn btn-danger btn-sm" onclick="resetearTodo()">Borrar todos los datos</button></div>';
  c.innerHTML=html;
}

function guardarAjustes(){
  S.presupuestoMensual=parseFloat(document.getElementById('aj-pres').value)||0;
  guardar();renderTab();
  var m=document.getElementById('aj-msg');if(m){m.className='msg-ok';m.textContent='Guardado.';}
}
function guardarUrl(){
  var url=document.getElementById('aj-url').value.trim();
  S.scriptUrl=url;
  localStorage.setItem('gastos_script_url',url);
  guardar();
  alert('URL guardada. Recarga la app para activar la sincronizacion.');
}
function cambiarKey(){
  var k=document.getElementById('aj-k').value.trim();
  if(!k)return;
  if(!k.startsWith('sk-ant')){alert('Key invalida.');return;}
  API_KEY=k;localStorage.setItem('gastos_api_key',k);alert('API key actualizada.');
}
function resetearTodo(){
  if(!confirm('Borras todos los datos?'))return;
  localStorage.removeItem('gastos_hogar');
  var url=getScriptUrl();
  if(url){
    var empty={gastos:[],presupuestoMensual:0,scriptUrl:url,syncedAt:new Date().toISOString(),uid:1};
    fetch(url,{method:'POST',body:JSON.stringify({action:'set',key:DATA_KEY,value:JSON.stringify(empty)})})
      .then(function(){location.reload();}).catch(function(){location.reload();});
  }else{location.reload();}
}
</script>
